<meta charset="utf-8">
<title>CTT Skilling LMS — Learner Portal</title>
<style>
  :root{
    --bg:#EEF1F7; --card:#FFFFFF; --soft:#F5F7FB;
    --primary:#1B7EC2; --primary-deep:#1273BC;
    --grad:linear-gradient(135deg,#2BA6DA 0%,#1273BC 100%);
    --navy:#14285C;
    --ink:#212B38; --muted:#8A94A4; --faint:#B4BCCA;
    --line:#ECEFF5;
    --ok:#2E9E52; --ok-bg:#E8F5EC;
    --warn:#C4881A; --warn-bg:#FBF3DE;
    --bad:#DE4B3E; --bad-bg:#FBE9E7;
    --chip-sky:#E9F2FB; --chip-sky-i:#2380C4;
    --chip-green:#E8F5EC; --chip-green-i:#3AA35B;
    --chip-amber:#FBF3DE; --chip-amber-i:#CE9526;
    --chip-lav:#EDEBFA; --chip-lav-i:#6B5BD1;
    --shadow:0 1px 3px rgba(20,40,92,.05);
    --r:18px; --r-sm:13px;
    --fs-pg:20px; --fs-sec:15px; --fs-body:13px; --fs-meta:11.5px; --fs-num:23px;
    --font:"SF Pro Rounded","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0F1522; --card:#171F2E; --soft:#1C2534;
      --primary:#4CAAE2; --primary-deep:#3B98D4; --grad:linear-gradient(135deg,#2E9AD6,#2A6FB2);
      --navy:#9DC4FF; --ink:#E9EFF8; --muted:#8B96A8; --faint:#5B6577; --line:#242E3E;
      --ok:#4FBE77; --ok-bg:#15301E; --warn:#E0A83A; --warn-bg:#31270E; --bad:#EC6B60; --bad-bg:#341A17;
      --chip-sky:#15263A; --chip-sky-i:#6FB6EC; --chip-green:#15301E; --chip-green-i:#5CC17F;
      --chip-amber:#31270E; --chip-amber-i:#E0A83A; --chip-lav:#201D3B; --chip-lav-i:#9E90EE;
      --shadow:0 1px 3px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="light"]{
    --bg:#EEF1F7; --card:#FFFFFF; --soft:#F5F7FB; --primary:#1B7EC2; --primary-deep:#1273BC;
    --grad:linear-gradient(135deg,#2BA6DA 0%,#1273BC 100%); --navy:#14285C;
    --ink:#212B38; --muted:#8A94A4; --faint:#B4BCCA; --line:#ECEFF5;
    --ok:#2E9E52; --ok-bg:#E8F5EC; --warn:#C4881A; --warn-bg:#FBF3DE; --bad:#DE4B3E; --bad-bg:#FBE9E7;
    --chip-sky:#E9F2FB; --chip-sky-i:#2380C4; --chip-green:#E8F5EC; --chip-green-i:#3AA35B;
    --chip-amber:#FBF3DE; --chip-amber-i:#CE9526; --chip-lav:#EDEBFA; --chip-lav-i:#6B5BD1;
    --shadow:0 1px 3px rgba(20,40,92,.05);
  }
  :root[data-theme="dark"]{
    --bg:#0F1522; --card:#171F2E; --soft:#1C2534; --primary:#4CAAE2; --primary-deep:#3B98D4;
    --grad:linear-gradient(135deg,#2E9AD6,#2A6FB2); --navy:#9DC4FF; --ink:#E9EFF8; --muted:#8B96A8;
    --faint:#5B6577; --line:#242E3E; --ok:#4FBE77; --ok-bg:#15301E; --warn:#E0A83A; --warn-bg:#31270E;
    --bad:#EC6B60; --bad-bg:#341A17; --chip-sky:#15263A; --chip-sky-i:#6FB6EC; --chip-green:#15301E;
    --chip-green-i:#5CC17F; --chip-amber:#31270E; --chip-amber-i:#E0A83A; --chip-lav:#201D3B; --chip-lav-i:#9E90EE;
    --shadow:0 1px 3px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);
    font-size:var(--fs-body);line-height:1.5;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  svg{display:block}

  .app{display:grid;grid-template-columns:264px 1fr;min-height:100vh}

  .sidebar{background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:28px 16px;position:sticky;top:0;height:100vh}
  .profile{display:flex;flex-direction:column;align-items:center;text-align:center;padding:4px 0 26px}
  .avatar{width:88px;height:88px;border-radius:50%;padding:3px;box-shadow:0 0 0 2.5px var(--primary);margin-bottom:12px}
  .avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
  .profile .nm{font-size:var(--fs-sec);font-weight:600}
  .profile .id{font-size:var(--fs-meta);color:var(--muted);margin-top:1px}
  .nav{display:flex;flex-direction:column;gap:3px;flex:1}
  .nav a{display:flex;align-items:center;gap:13px;padding:10px 14px;border-radius:11px;color:var(--muted);font-weight:500;text-decoration:none;cursor:pointer;transition:.15s}
  .nav a svg{width:18px;height:18px;flex:none;transition:.15s}
  .nav a:hover{background:var(--soft);color:var(--ink)}
  .nav a.active{background:var(--grad);color:#fff;font-weight:600;box-shadow:0 5px 14px rgba(27,126,194,.3)}
  .logout{margin-top:auto;padding-top:12px}

  .main{padding:26px 30px 44px;min-width:0}
  .topbar{display:flex;gap:16px;align-items:center;margin-bottom:26px}
  .topbar h2{font-size:var(--fs-pg);font-weight:700;letter-spacing:-.3px}
  .topbar .crumb{font-size:var(--fs-meta);color:var(--muted);margin-top:2px}
  .top-actions{margin-left:auto;display:flex;align-items:center;gap:14px}
  .top-actions .ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:var(--muted);background:var(--card);box-shadow:var(--shadow)}
  .top-actions .ico svg{width:18px;height:18px}
  .brand{display:flex;flex-direction:column;align-items:center;line-height:1.05}
  .brand .lt{font-weight:800;font-size:13px;color:var(--navy);letter-spacing:.4px}
  .brand .sub{font-size:8px;font-weight:600;letter-spacing:1.4px;color:var(--primary);margin-top:2px}

  .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:24px 26px}
  .grid{display:grid;gap:20px}
  .g2{grid-template-columns:1.4fr 1fr}
  .g2e{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px}
  .head h3{font-size:var(--fs-sec);font-weight:600}
  .link{color:var(--primary);font-weight:600;font-size:var(--fs-meta);text-decoration:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .link svg{width:14px;height:14px}
  .muted{color:var(--muted)}
  .lbl{font-size:var(--fs-meta);color:var(--muted);text-transform:uppercase;letter-spacing:.6px}

  .chip{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex:none}
  .chip svg{width:20px;height:20px}
  .c-sky{background:var(--chip-sky);color:var(--chip-sky-i)}
  .c-green{background:var(--chip-green);color:var(--chip-green-i)}
  .c-amber{background:var(--chip-amber);color:var(--chip-amber-i)}
  .c-lav{background:var(--chip-lav);color:var(--chip-lav-i)}

  .pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:999px;font-size:var(--fs-meta);font-weight:600;line-height:1.4}
  .pill svg{width:12px;height:12px}
  .p-ok{background:var(--ok-bg);color:var(--ok)}
  .p-warn{background:var(--warn-bg);color:var(--warn)}
  .p-bad{background:var(--bad-bg);color:var(--bad)}
  .p-neu{background:var(--soft);color:var(--muted)}

  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:11px;font-weight:600;font-size:var(--fs-body);transition:.15s}
  .btn svg{width:15px;height:15px}
  .btn-p{background:var(--grad);color:#fff;box-shadow:0 5px 14px rgba(27,126,194,.28)}
  .btn-o{border:1px solid var(--line);color:var(--muted)}
  .btn-o:hover{color:var(--primary);border-color:var(--primary)}
  .btn-sm{padding:7px 13px}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:20px}
  .feat{background:var(--grad);color:#fff;border-radius:var(--r-sm);padding:16px 18px;margin-top:16px}
  .feat .ft{font-weight:600}
  .feat .fm{font-size:var(--fs-meta);opacity:.9;margin-top:3px}
  .stat{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:22px 24px;display:flex;align-items:center;gap:16px}
  .stat .v{font-size:var(--fs-num);font-weight:700;line-height:1}
  .stat .k{font-size:var(--fs-meta);color:var(--muted);margin-top:5px}

  .crow{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .crow:last-child{border:none;padding-bottom:0}
  .crow:first-child{padding-top:0}
  .crow .nm{font-weight:600}
  .crow .bar{flex:1;max-width:200px;height:6px;border-radius:99px;background:var(--line);overflow:hidden}
  .crow .bar i{display:block;height:100%;background:var(--grad)}
  .crow .pct{font-weight:600;color:var(--muted);width:38px;text-align:right}

  .ccard{border:1px solid var(--line);border-radius:var(--r-sm);padding:20px;cursor:pointer;transition:.15s}
  .ccard:hover{box-shadow:var(--shadow);border-color:transparent}
  .ccard .nm{font-weight:600;margin-top:14px}
  .ccard .mt{font-size:var(--fs-meta);color:var(--muted);margin-top:2px}
  .ccard .bar{height:6px;border-radius:99px;background:var(--line);overflow:hidden;margin-top:16px}
  .ccard .bar i{display:block;height:100%;background:var(--grad)}
  .ccard .pct{font-size:var(--fs-meta);color:var(--muted);margin-top:8px;text-align:right}

  .lrow{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
  .lrow:last-child{border:none;padding-bottom:0}
  .lrow:first-child{padding-top:0}
  .lrow .nm{font-weight:600}
  .lrow .mt{font-size:var(--fs-meta);color:var(--muted);margin-top:1px}
  .time{font-weight:600;color:var(--primary);white-space:nowrap}

  .tbl{width:100%;border-collapse:collapse}
  .tbl th{text-align:left;font-size:var(--fs-meta);font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:0 12px 14px}
  .tbl td{padding:15px 12px;border-top:1px solid var(--line);color:var(--muted)}
  .tbl td.nm{color:var(--ink);font-weight:600}

  .tabs{display:flex;gap:28px;border-bottom:1px solid var(--line);margin-bottom:24px}
  .tabs button{padding:0 1px 14px;font-weight:600;color:var(--muted);position:relative}
  .tabs button.active{color:var(--ink)}
  .tabs button.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--primary)}

  .ring{width:120px;height:120px;border-radius:50%;display:grid;place-items:center;flex:none}
  .ring::before{content:"";width:96px;height:96px;border-radius:50%;background:var(--card);position:absolute}
  .ring span{position:relative;font-size:var(--fs-num);font-weight:700}

  .acc{border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:12px}
  .acc:last-child{margin:0}
  .acc-h{display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer}
  .acc-h .t{font-weight:600}
  .acc-h .cnt{margin-left:auto;font-size:var(--fs-meta);color:var(--muted);margin-right:12px}
  .acc-h svg.cv{width:18px;height:18px;color:var(--faint);transition:.2s;flex:none}
  .acc.open svg.cv{transform:rotate(180deg)}
  .acc-b{display:none;padding:0 18px 10px}
  .acc.open .acc-b{display:block}
  .lesson{display:flex;align-items:center;gap:13px;padding:12px 0;border-top:1px solid var(--line)}
  .lesson svg{width:17px;height:17px;color:var(--muted);flex:none}
  .lesson .t{font-weight:500}

  .cal{width:100%;border-collapse:collapse;table-layout:fixed;min-width:640px}
  .cal th{font-size:var(--fs-meta);color:var(--muted);font-weight:600;padding:10px 8px;text-align:left}
  .cal td{height:82px;vertical-align:top;border:1px solid var(--line);padding:7px;font-size:var(--fs-meta)}
  .cal td .dn{color:var(--faint);font-weight:600}
  .cal td.today{background:var(--chip-sky)}
  .cal td.today .dn{color:var(--primary)}
  .cal td.out{opacity:.35}
  .cal .dot{width:6px;height:6px;border-radius:50%;background:var(--primary);margin-top:8px}
  .cal .dot.g{background:var(--chip-green-i)}
  .cal .dot.a{background:var(--chip-amber-i)}
  .cal .cev{font-size:9.5px;font-weight:600;border-radius:5px;padding:3px 6px;margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .seg{display:inline-flex;background:var(--soft);border-radius:11px;padding:3px}
  .seg button{padding:7px 15px;border-radius:8px;font-weight:600;color:var(--muted)}
  .seg button.active{background:var(--card);color:var(--primary);box-shadow:var(--shadow)}

  .evc{border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;cursor:pointer;transition:.15s}
  .evc:hover{box-shadow:var(--shadow)}
  .evc .img{height:104px;background-size:cover}
  .evc .body{padding:16px 18px}
  .evc .dt{font-size:var(--fs-meta);color:var(--primary);font-weight:600}
  .evc .nm{font-weight:600;margin-top:4px}

  .thr{display:flex;gap:14px;padding:18px 0;border-bottom:1px solid var(--line)}
  .thr:last-child{border:none;padding-bottom:0}
  .thr:first-child{padding-top:0}
  .ava{width:38px;height:38px;border-radius:50%;flex:none;display:grid;place-items:center;background:var(--soft);color:var(--muted);font-weight:600}
  .thr .nm{font-weight:600}
  .thr .mt{font-size:var(--fs-meta);color:var(--muted);margin-top:6px}

  .kv{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .kv .k{font-size:var(--fs-meta);color:var(--muted)}
  .kv .v{font-weight:600;margin-top:3px}
  .field label{display:block;font-size:var(--fs-meta);color:var(--muted);margin-bottom:6px}
  .field input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:var(--soft);color:var(--ink);font-size:var(--fs-body)}
  .field input:focus{outline:none;border-color:var(--primary);background:var(--card)}

  .opt{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;margin-bottom:10px;cursor:pointer}
  .opt:hover{border-color:var(--primary)}
  .opt.sel{border-color:var(--primary);background:var(--chip-sky)}
  .opt .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--faint);flex:none;display:grid;place-items:center}
  .opt.sel .dot{border-color:var(--primary)}
  .opt.sel .dot::after{content:"";width:9px;height:9px;border-radius:50%;background:var(--primary)}

  .p-info{background:var(--chip-sky);color:var(--chip-sky-i)}
  .ctop-stats{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .ctop-stats .k{font-size:var(--fs-meta);color:var(--muted)}
  .ctop-stats .v{font-weight:700;font-size:17px;margin-top:9px;color:var(--primary);display:flex;align-items:center;gap:8px}
  .rmini{width:22px;height:22px;border-radius:50%;display:inline-grid;place-items:center;background:conic-gradient(var(--primary) 70%,var(--line) 0)}
  .rmini i{width:13px;height:13px;border-radius:50%;background:var(--card)}
  .mod{border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:12px;cursor:pointer;transition:.15s}
  .mod:last-child{margin-bottom:0}
  .mod:hover{border-color:var(--primary)}
  .mod.active{border-color:var(--primary);background:var(--chip-sky)}
  .mod .mn{font-weight:600}
  .mod .md{display:flex;align-items:center;gap:6px;font-size:var(--fs-meta);color:var(--muted);margin-top:7px}
  .mod .md svg{width:13px;height:13px}
  .csplit{display:grid;grid-template-columns:300px 1fr}
  .csplit .left{padding-right:28px;border-right:1px solid var(--line)}
  .csplit .right{padding-left:28px;min-width:0}
  .trow{display:grid;grid-template-columns:minmax(170px,1.2fr) 1fr 110px 88px;align-items:center;gap:20px;padding:15px 16px;border-radius:12px}
  .trow:hover{background:var(--soft)}
  .trow .tn{font-size:var(--fs-meta);color:var(--muted)}
  .trow .tt{font-weight:600;margin-top:2px}
  @media (max-width:900px){.csplit{grid-template-columns:1fr}.csplit .left{border:none;padding:0 0 20px}.csplit .right{padding:0}.trow{grid-template-columns:1fr auto}}
  .view{display:none}
  .view.active{display:block;animation:f .2s ease}
  @keyframes f{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  .tgl{position:fixed;right:18px;bottom:18px;width:40px;height:40px;border-radius:50%;background:var(--card);box-shadow:0 2px 10px rgba(0,0,0,.15);display:grid;place-items:center;color:var(--muted);z-index:50}
  .tgl svg{width:18px;height:18px}

  @media (max-width:1000px){
    .app{grid-template-columns:1fr}
    .sidebar{position:static;height:auto;flex-direction:row;flex-wrap:wrap;padding:14px}
    .profile{flex-direction:row;padding:0;gap:10px}.avatar{width:40px;height:40px;margin:0}
    .nav{flex-direction:row;flex-wrap:wrap}.nav a span{display:none}.logout{margin:0}
    .g2,.g2e,.g3,.g4,.stats,.kv{grid-template-columns:1fr}
  }
</style>

</div>

function tclass(time,name,loc,col){return '<div style="display:flex;align-items:center;gap:16px;padding:14px 16px;background:var(--soft);border-left:3px solid '+col+';border-radius:10px;margin-bottom:10px"><div class="time" style="width:120px">'+time+'</div><div style="flex:1;min-width:0"><div style="font-weight:600">'+name+'</div><div class="muted" style="font-size:var(--fs-meta);margin-top:2px">'+loc+'</div></div></div>';}
function tday(label,today,rows){var r='';for(var k=0;k<rows.length;k++){r+=tclass(rows[k][0],rows[k][1],rows[k][2],rows[k][3]);}return '<div style="margin-bottom:22px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span style="font-weight:600">'+label+'</span>'+(today?'<span class="pill p-ok">Today</span>':'')+'</div>'+r+'</div>';}
const NAV=[['dash','home','Home'],['courses','book','My Courses'],['assess','doc','Assessments'],['grades','award','My Grades'],['attend','check','My Attendance'],['timetable','grid','Timetable']];
const T={dash:['Home',''],courses:['My Courses',''],content:['Course Content','My Courses › Welder'],assess:['Assessments',''],grades:['My Grades',''],attend:['My Attendance',''],timetable:['Timetable',''],mentor:['Mentoring',''],forum:['Discussion Forum',''],events:['Events',''],profile:['My Profile','']};

const nav=document.getElementById('nav');
NAV.forEach(([id,i,l])=>{const a=document.createElement('a');a.dataset.goto=id;a.innerHTML=ic(i)+'<span>'+l+'</span>';nav.appendChild(a);});
const lw=document.createElement('div');lw.className='logout';const lo=document.createElement('a');lo.dataset.goto='dash';lo.innerHTML=ic('logout')+'<span>Logout</span>';lw.appendChild(lo);nav.appendChild(lw);
document.getElementById('a-gear').innerHTML=ic('gear');

const views=document.getElementById('views');
function render(id){
  views.innerHTML='<section class="view active">'+V[id]+'</section>';
  const navId=(id==='content')?'courses':id;
  document.querySelectorAll('#nav > a').forEach(a=>a.classList.toggle('active',a.dataset.goto===navId));
  document.getElementById('pg-title').textContent=T[id][0];
  document.getElementById('pg-crumb').textContent=T[id][1];
  if(id==='timetable')cal();
  scrollTo(0,0);
}
document.addEventListener('click',e=>{
  const g=e.target.closest('[data-goto]');if(g){e.preventDefault();render(g.dataset.goto);return;}
  const tg=e.target.closest('[data-tabgo]');if(tg){setTab('assess',tg.dataset.tabgo);return;}
  const tb=e.target.closest('.tabs button');if(tb){const w=tb.closest('.tabs');w.querySelectorAll('button').forEach(b=>b.classList.remove('active'));tb.classList.add('active');if(tb.dataset.p){const sc=w.closest('.card')||document;sc.querySelectorAll('[data-body]').forEach(b=>b.style.display=b.dataset.body===tb.dataset.p?'':'none');}return;}
  const sg=e.target.closest('.seg button');if(sg){sg.closest('.seg').querySelectorAll('button').forEach(b=>b.classList.remove('active'));sg.classList.add('active');return;}
  const ah=e.target.closest('.acc-h');if(ah){ah.closest('.acc').classList.toggle('open');return;}
  const op=e.target.closest('.opt');if(op){op.parentElement.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));op.classList.add('sel');return;}
});
function panel(p){document.querySelectorAll('[data-body]').forEach(b=>b.style.display=b.dataset.body===p?'':'none');}
function setTab(t,p){const w=document.querySelector('.tabs[data-tabs="'+t+'"]');if(w)w.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.p===p));panel(p);}

function cal(){
  const b=document.getElementById('cal');if(!b)return;const first=3,dim=31;let d=1-first,h='';
  for(let w=0;w<6;w++){h+='<tr>';for(let i=0;i<7;i++){
    if(d<1||d>dim){h+='<td class="out"><span class="dn">'+(d<1?30+d:d-dim)+'</span></td>';}
    else{let dot=(i!==0)?'<div class="dot g"></div>':'';if(d===15)dot='<div class="dot a"></div>';if(d===24)dot='<div class="dot"></div>';
      h+='<td class="'+(d===22?'today':'')+'"><span class="dn">'+d+'</span>'+dot+'</td>';}
    d++;}h+='</tr>';if(d>dim)break;}
  b.innerHTML=h;
}

const tgl=document.getElementById('tgl');
function dark(){const r=document.documentElement.getAttribute('data-theme');return r?r==='dark':matchMedia('(prefers-color-scheme:dark)').matches;}
function paint(){tgl.innerHTML=ic(dark()?'sun':'moon');}
tgl.onclick=()=>{document.documentElement.setAttribute('data-theme',dark()?'light':'dark');paint();};
matchMedia('(prefers-color-scheme:dark)').addEventListener('change',paint);
paint();render('dash');
</script>
